version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: simple_blog_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: simple_blog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - blog_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d simple_blog"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_migration:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simple_blog_migrations
    command: ["./dbmigrate", "-action=up"]
    environment:
      DATABASE_URL: "postgres://postgres:${DB_PASSWORD}@db:5432/simple_blog?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - blog_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simple_blog_api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "host=db user=postgres password=${DB_PASSWORD} dbname=simple_blog port=5432 sslmode=disable"
      JWT_SECRET: ${JWT_SECRET}
      PORT: "8080"
    depends_on:
      db_migration:
        condition: service_completed_successfully
    networks:
      - blog_network

volumes:
  postgres_data:

networks:
  blog_network:
    driver: bridge
